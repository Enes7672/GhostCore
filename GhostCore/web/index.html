<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostCore v4 | War Room Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0e14;
            --bg-card: rgba(20, 24, 33, 0.85);
            --accent-neon: #00f5d4;
            --accent-purple: #7209b7;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-glow: rgba(0, 245, 212, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Background Animation --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(114, 9, 183, 0.05), transparent 70%);
            z-index: -1;
        }

        /* --- Header --- */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 100;
        }

        .brand h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-neon), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .dot { height: 8px; width: 8px; background-color: var(--accent-neon); border-radius: 50%; box-shadow: 0 0 10px var(--accent-neon); }
        .dot.offline { background-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }

        /* --- Main Layout --- */
        main {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem 5%;
            flex: 1;
        }

        /* --- Left Column: Missions --- */
        .mission-panel { display: flex; flex-direction: column; gap: 2rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .mission-input-group { display: flex; flex-direction: column; gap: 1rem; }
        textarea {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--accent-neon); }

        button {
            background: linear-gradient(135deg, var(--accent-purple), #3a0ca3);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(114, 9, 183, 0.4); }

        /* --- Right Column: Logs / War Room --- */
        .log-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 100px;
        }

        .terminal {
            flex: 1;
            background: #000;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            border: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 10px rgba(0,245,212,0.1);
        }

        .log-entry { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-agent { color: var(--accent-neon); font-weight: bold; min-width: 80px; }
        .log-msg { color: var(--text-main); line-height: 1.4; }
        .log-agent.error { color: #ff4d4d; }

        /* --- Stats Row --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: auto; }
        .stat-card { text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: 600; color: var(--accent-neon); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); }

        /* --- Code View --- */
        #code-display {
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
            background: #050505;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        /* --- Responsive --- */
        @media (max-width: 1000px) {
            main { grid-template-columns: 1fr; }
            .log-panel { position: static; max-height: 500px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>GhostCore v4 Gateway</h1>
        </div>
        <div class="status-badge">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">Engine Online</span>
        </div>
    </header>

    <main>
        <div class="mission-panel">
            <div class="card">
                <div class="mission-input-group">
                    <h2 style="margin-bottom: 10px; font-weight: 400; font-size: 1.2rem;">New Autonomous Mission</h2>
                    <textarea id="task-desc" placeholder="Describe your goal... (e.g. Write a secure Python calculator class)" rows="4"></textarea>
                    <div style="display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-dim);">
                        <input type="checkbox" id="force-local"> <span>Force Local Model (Llama3/Phi3)</span>
                    </div>
                    <button id="btn-execute">Launch Mission</button>
                </div>
            </div>

            <div id="mission-status-card" class="card" style="display: none;">
                <h3 id="mission-title" style="margin-bottom: 10px; color: var(--accent-neon);">Current Mission</h3>
                <p id="mission-info" style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dim);"></p>
                <div id="code-display"></div>
            </div>

            <div class="stats-grid">
                <div class="card stat-card">
                    <div id="stat-cpu" class="stat-val">--%</div>
                    <div class="stat-label">CPU Usage</div>
                </div>
                <div class="card stat-card">
                    <div id="stat-ram" class="stat-val">-- GB</div>
                    <div class="stat-label">RAM Free</div>
                </div>
                <div class="card stat-card">
                    <div id="stat-tokens" class="stat-val">-- k</div>
                    <div class="stat-label">Tokens / S</div>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <h2 style="font-weight: 300; letter-spacing: 1px; font-size: 1rem;">WAR ROOM LOGS</h2>
            <div id="terminal" class="terminal">
                <div class="log-entry"><span class="log-agent">System</span><span class="log-msg">Connecting to GhostCore stream...</span></div>
            </div>
        </div>
    </main>

    <script>
        const DOM = {
            terminal: document.getElementById('terminal'),
            btnExecute: document.getElementById('btn-execute'),
            taskDesc: document.getElementById('task-desc'),
            forceLocal: document.getElementById('force-local'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            cpu: document.getElementById('stat-cpu'),
            ram: document.getElementById('stat-ram'),
            tokens: document.getElementById('stat-tokens'),
            missionCard: document.getElementById('mission-status-card'),
            missionInfo: document.getElementById('mission-info'),
            codeDisplay: document.getElementById('code-display')
        };

        let currentMissionId = null;

        // --- Log Stream (WebSocket) ---
        function connectLogs() {
            const wsUrl = `ws://${window.location.host}/ws/logs`;
            const ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                const log = JSON.parse(event.data);
                appendLog(log.agent, log.message);
                
                // If it's a mission event, maybe refresh status
                if (currentMissionId) {
                    refreshMissionStatus();
                }
            };

            ws.onclose = () => {
                appendLog('System', 'Disconnected. Retrying...', true);
                setTimeout(connectLogs, 5000);
            };
        }

        function appendLog(agent, msg, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const agentSpan = document.createElement('span');
            agentSpan.className = `log-agent ${isError ? 'error' : ''}`;
            agentSpan.textContent = agent.toUpperCase();
            const msgSpan = document.createElement('span');
            msgSpan.className = 'log-msg';
            msgSpan.textContent = msg;

            entry.appendChild(agentSpan);
            entry.appendChild(msgSpan);
            DOM.terminal.appendChild(entry);
            DOM.terminal.scrollTop = DOM.terminal.scrollHeight;
        }

        // --- Execute Task ---
        DOM.btnExecute.onclick = async () => {
            const desc = DOM.taskDesc.value.trim();
            if (!desc) return;

            DOM.btnExecute.disabled = true;
            DOM.btnExecute.textContent = 'Launching...';

            try {
                const resp = await fetch('/missions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description: desc,
                        force_local: DOM.forceLocal.checked
                    })
                });
                const data = await resp.json();
                currentMissionId = data.mission_id;
                
                DOM.missionCard.style.display = 'block';
                DOM.missionInfo.textContent = `Mission ID: ${currentMissionId} | Status: Processing...`;
                appendLog('System', `Mission tracked: ${currentMissionId}`);
            } catch (err) {
                appendLog('Error', 'Failed to launch mission.', true);
            } finally {
                DOM.btnExecute.disabled = false;
                DOM.btnExecute.textContent = 'Launch Mission';
            }
        };

        // --- System Stats Sync ---
        async function fetchStats() {
            try {
                const resp = await fetch('/');
                const data = await resp.json();
                
                DOM.statusDot.className = data.status === 'online' ? 'dot' : 'dot offline';
                DOM.statusText.textContent = `Engine ${data.status.toUpperCase()}`;
                
                if (data.stats) {
                    DOM.cpu.textContent = `${data.stats.cpu_usage}%`;
                    DOM.ram.textContent = `${data.stats.memory_usage_gb} GB`;
                    DOM.tokens.textContent = `${(data.stats.tokens?.total_tokens / 1000 || 0).toFixed(1)} k`;
                }
            } catch(e) {}
        }

        // --- Mission Status Loop ---
        async function refreshMissionStatus() {
            if (!currentMissionId) return;
            try {
                const resp = await fetch(`/missions/${currentMissionId}`);
                if (!resp.ok) return;
                const data = await resp.json();

                DOM.missionInfo.textContent = `Round: ${data.round} | Status: ${data.status.toUpperCase()}`;
                
                if (data.current_code) {
                    DOM.codeDisplay.textContent = data.current_code;
                    DOM.codeDisplay.style.display = 'block';
                }

                if (data.status === 'completed' || data.status === 'failed') {
                    appendLog('System', `Mission ${data.status}!`);
                    // currentMissionId = null; // Stop polling
                }
            } catch(e) {}
        }

        setInterval(fetchStats, 3000);
        setInterval(refreshMissionStatus, 5000);
        connectLogs();
    </script>
</body>
</html>
